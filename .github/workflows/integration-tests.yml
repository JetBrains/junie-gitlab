name: Junie Integration Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.ref, 'refs/heads/dependabot/') }}
    timeout-minutes: 45

    env:
      COMPOSE_FILE: docker-compose.test.yml
      JUNIE_API_KEY: ${{ secrets.JUNIE_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build wrapper image from this branch
        run: docker build -t junie-gitlab-wrapper:test .

      - name: Start local GitLab stack
        run: docker compose -f "$COMPOSE_FILE" up -d

      - name: Bootstrap local GitLab
        run: ./scripts/bootstrap-local-gitlab.sh

      - name: Run integration tests
        id: run-tests
        run: npm run test:integration

      - name: Dump docker compose logs on failure
        if: failure()
        run: |
          mkdir -p test-results
          docker compose -f "$COMPOSE_FILE" logs --no-color gitlab gitlab-runner > test-results/compose-logs.txt || true
          docker compose -f "$COMPOSE_FILE" ps > test-results/compose-ps.txt || true

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-report
          if-no-files-found: ignore
          path: ./test-results/
          retention-days: 7

      - name: Tear down local GitLab stack
        if: always()
        run: ./scripts/teardown-local-gitlab.sh
